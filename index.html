<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard EWS Banjir</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in {
      animation: fadeInUp 0.6s ease-out both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">

  <div class="max-w-4xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center text-blue-700 mb-6 fade-in">📡 Dashboard Pemantauan Banjir</h1>

    <div id="statusBox" class="fade-in p-6 rounded-2xl bg-green-200 shadow-md mb-6 transition-all duration-500">
      <h2 class="text-2xl font-semibold mb-2">Status: <span id="statusText" class="font-bold">Normal</span></h2>
      <p class="text-xl">Ketinggian Air Saat Ini: <span id="waterLevel">--</span> cm</p>
      <p class="text-sm text-gray-700 mt-1">Data realtime dari sensor</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-lg fade-in">
      <canvas id="waterChart" height="120"></canvas>
    </div>
  </div>

  <div id="cuacaBox" class="bg-white p-4 mt-6 rounded-xl shadow-md">
  <h2 class="text-xl font-semibold mb-2">🌤️ Prediksi Cuaca 5 Hari ke Depan</h2>
  <div id="cuacaList" class="grid grid-cols-2 md:grid-cols-5 gap-4 text-sm text-gray-700">
    <!-- Data akan muncul di sini -->
  </div>
</div>


  <script>
    // Dummy data awal
    let dataRiwayat = [80, 85, 90, 100, 120, 125, 130];
    let ctx = document.getElementById('waterChart').getContext('2d');
    let chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['-6m', '-5m', '-4m', '-3m', '-2m', '-1m', 'Sekarang'],
        datasets: [{
          label: 'Ketinggian Air (cm)',
          data: dataRiwayat,
          borderColor: '#3B82F6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          tension: 0.3,
          fill: true,
          pointRadius: 3,
          pointBackgroundColor: '#1D4ED8'
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            min: 0,
            max: 200
          }
        }
      }
    });

    // Update status box dinamis
    function updateStatus(level) {
      const box = document.getElementById("statusBox");
      const text = document.getElementById("statusText");
      const value = document.getElementById("waterLevel");

      value.innerText = level;

      if (level < 100) {
        box.className = "fade-in p-6 rounded-2xl bg-green-200 shadow-md mb-6";
        text.innerText = "Normal";
      } else if (level < 120) {
        box.className = "fade-in p-6 rounded-2xl bg-yellow-200 shadow-md mb-6";
        text.innerText = "Waspada";
      } else {
        box.className = "fade-in p-6 rounded-2xl bg-red-300 shadow-md mb-6";
        text.innerText = "Bahaya";
      }

      // Update grafik
      chart.data.datasets[0].data.push(level);
      chart.data.datasets[0].data.shift();
      chart.update();
    }

    // Simulasi data realtime (ganti dengan fetch Firebase nanti)
    setInterval(() => {
      const level = Math.floor(Math.random() * 70 + 80); // 80 - 150 cm
      updateStatus(level);
    }, 3000); // Update tiap 3 detik
  </script>


<script>
  const apiKey = "9d3abcd072eda89b1f3136bfdc67af25";
  const city = "Semarang";

  fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric&lang=id`)
    .then(res => res.json())
    .then(data => {
      const cuacaList = document.getElementById("cuacaList");
      cuacaList.innerHTML = "";

      // Ambil 5 data (setiap 1x per 24 jam, biasanya per 8 jam interval)
      for (let i = 0; i < data.list.length; i += 8) {
        const item = data.list[i];
        const date = new Date(item.dt * 1000);
        const icon = item.weather[0].icon;
        const desc = item.weather[0].description;

        cuacaList.innerHTML += `
          <div class="text-center bg-blue-50 p-2 rounded-lg shadow-sm">
            <p class="font-bold">${date.toLocaleDateString("id-ID", { weekday: "short" })}</p>
            <img src="https://openweathermap.org/img/wn/${icon}@2x.png" class="mx-auto" alt="cuaca">
            <p class="capitalize">${desc}</p>
            <p class="text-sm">${item.main.temp.toFixed(1)}°C</p>
          </div>
        `;
      }
    });
</script>



</body>
</html>
