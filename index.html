<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard EWS Banjir</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <div class="max-w-4xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center text-blue-700 mb-6 fade-in">📡 Dashboard Pemantauan Banjir</h1>

    <div id="statusBox" class="fade-in p-6 rounded-2xl bg-green-200 shadow-md mb-6 transition-all duration-500">
      <h2 class="text-2xl font-semibold mb-2">Status: <span id="statusText" class="font-bold">Normal</span></h2>
      <p class="text-xl">Ketinggian Air Saat Ini: <span id="waterLevel">--</span> cm</p>
      <p class="text-sm text-gray-700 mt-1">Data realtime dari sensor</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 fade-in">
      <div class="bg-white rounded-xl shadow-lg p-4 transition-all duration-500">
        <h2 class="text-xl font-semibold text-blue-700 mb-2">🚿 Debit Aliran Air</h2>
        <p class="text-lg">Flow Rate: <span id="flowRate">--</span> L/min</p>
        <p class="font-bold text-sm mt-1" id="flowStatus">Status: --</p>
      </div>
      <div class="bg-white rounded-xl shadow-lg p-4 transition-all duration-500">
        <h2 class="text-xl font-semibold text-green-700 mb-2">🌱 Kelembapan Tanah</h2>
        <p class="text-lg">Soil Moisture: <span id="soilMoisture">--</span>%</p>
        <p class="font-bold text-sm mt-1" id="soilStatus">Trigger: --</p>
      </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-lg fade-in">
      <canvas id="waterChart" height="120"></canvas>
    </div>

    <div id="cuacaBox" class="bg-white p-4 mt-6 rounded-xl shadow-md">
      <h2 class="text-xl font-semibold mb-2">🌤️ Prediksi Cuaca 5 Hari ke Depan</h2>
      <div id="cuacaList" class="grid grid-cols-2 md:grid-cols-5 gap-4 text-sm text-gray-700">
        <!-- Cuaca data here -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
